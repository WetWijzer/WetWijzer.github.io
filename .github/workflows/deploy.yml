# Simple workflow for deploying static content to GitHub Pages
name: Deploy Vite App to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Validate Netherlands sample corpus
        run: npm run validate:netherlands-corpus
      - name: Build
        run: npm run build
        env:
          VITE_WETWIJZER_DATA_PROVIDER: ${{ vars.VITE_WETWIJZER_DATA_PROVIDER || 'huggingface' }}
          VITE_OPENROUTER_ENABLED: ${{ vars.VITE_OPENROUTER_ENABLED || 'false' }}
          VITE_OPENROUTER_BASE_URL: ${{ vars.VITE_OPENROUTER_BASE_URL || '' }}
          VITE_LOCAL_GENERATION_FALLBACK_MS: ${{ vars.VITE_LOCAL_GENERATION_FALLBACK_MS || '5000' }}
          VITE_LOCAL_GENERATION_TIMEOUT_MS: ${{ vars.VITE_LOCAL_GENERATION_TIMEOUT_MS || '12000' }}
          VITE_LOCAL_PROBE_TIMEOUT_MS: ${{ vars.VITE_LOCAL_PROBE_TIMEOUT_MS || '10000' }}
          VITE_LOCAL_PERF_BENCH_TIMEOUT_MS: ${{ vars.VITE_LOCAL_PERF_BENCH_TIMEOUT_MS || '8000' }}
          VITE_OPENROUTER_DEFAULT_MODEL: liquid/lfm-2.5-1.2b-instruct:free
          VITE_OPENROUTER_THINKING_MODEL: liquid/lfm-2.5-1.2b-thinking:free
          VITE_CLIENT_LLM_MODEL: LiquidAI/LFM2.5-1.2B-Instruct-ONNX
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
